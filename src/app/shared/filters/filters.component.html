<div class="filters-card">
  <div class="filters-grid">
    <!-- Search Input -->
    <div class="filter-item search-item">
      <div class="header-search-bar">
        <lucide-icon [img]="Search" class="search-icon" size="16"></lucide-icon>
        <input
          type="text"
          class="header-search-input"
          [ngModel]="search()"
          (ngModelChange)="search.set($event); onFilterChange()"
          placeholder="Rechercher par nom ou prénom..."
        />
        @if (search()) {
          <button class="search-clear-btn" (click)="search.set(''); onFilterChange()" type="button">
            <lucide-icon [img]="X" size="14"></lucide-icon>
          </button>
        }
      </div>
    </div>

    <!-- Service Dropdown -->
    <div class="filter-item">
      <select [ngModel]="selectedService()" (ngModelChange)="selectedService.set($event); onFilterChange()">
        <option value="">Tous les services</option>
        @for (s of services(); track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>

    <!-- Team (Ilot) Dropdown -->
    <div class="filter-item">
      <select [ngModel]="selectedTeam()" (ngModelChange)="selectedTeam.set($event); onFilterChange()">
        <option value="">Toutes les équipes</option>
        @for (t of teams(); track t) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
    </div>

    <!-- Work Site Dropdown -->
    <div class="filter-item">
      <select [ngModel]="selectedWorkSite()" (ngModelChange)="selectedWorkSite.set($event); onFilterChange()">
        <option value="">Tous les sites</option>
        @for (ws of workSites(); track ws) {
          <option [value]="ws">{{ ws }}</option>
        }
      </select>
    </div>

    <!-- Contract Type Dropdown -->
    <div class="filter-item">
      <select [ngModel]="selectedContractType()" (ngModelChange)="selectedContractType.set($event); onFilterChange()">
        <option value="">Tous les types</option>
        @for (ct of contractTypes(); track ct) {
          <option [value]="ct">{{ ct }}</option>
        }
      </select>
    </div>

    <!-- Reset Button -->
    @if (search() || selectedService() || selectedTeam() || selectedWorkSite() || selectedContractType()) {
      <div class="filter-item actions-item">
        <button class="btn btn-outline btn-reset" (click)="resetFilters()" type="button">
          <lucide-icon [img]="X" size="16"></lucide-icon>
          Effacer
        </button>
      </div>
    }
  </div>

  <!-- Active Filter Badges inside the Filters Card -->
  @if (activeFilterLabels().length > 0) {
    <div class="active-filters-row">
      <span class="active-filters-label">Filtres appliqués :</span>
      <div class="active-filters-list">
        @for (pill of activeFilterLabels(); track pill.key) {
          <span class="filter-pill">
            <span class="filter-pill-name">{{ pill.label }} :</span>
            <span class="filter-pill-val">{{ pill.value }}</span>
            <button class="filter-pill-close" (click)="clearFilter(pill.key)" title="Enlever ce filtre">
              <lucide-icon [img]="X" size="12"></lucide-icon>
            </button>
          </span>
        }
      </div>
    </div>
  }
</div>
