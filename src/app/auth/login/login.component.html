<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand">
        <span class="brand-logo">📅</span>
        <h1>CrewDayz</h1>
      </div>
      <p class="subtitle">Gestion des absences et planification RH</p>
    </div>

    <!-- Alert for session expiration -->
    @if (sessionExpired()) {
      <div class="alert alert-info animate-fade-in">
        <lucide-icon [img]="Info" size="18"></lucide-icon>
        <span>Votre session a expiré. Veuillez vous reconnecter.</span>
      </div>
    }

    <!-- Alert for general errors -->
    @if (errorMessage()) {
      <div class="alert alert-danger animate-fade-in">
        <lucide-icon [img]="Info" size="18"></lucide-icon>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form (ngSubmit)="signInWithEmail()" class="auth-form">
      <div class="form-group">
        <label for="email">Adresse Email</label>
        <div class="input-icon-wrapper">
          <lucide-icon [img]="Mail" class="input-icon" size="18"></lucide-icon>
          <input
            id="email"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            placeholder="nom@entreprise.com"
            required
            autocomplete="email"
          />
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password">Mot de passe</label>
          <a (click)="navigateToForgot()" class="forgot-link">Mot de passe oublié ?</a>
        </div>
        <div class="input-icon-wrapper">
          <lucide-icon [img]="Lock" class="input-icon" size="18"></lucide-icon>
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()" tabindex="-1">
            <lucide-icon [img]="showPassword() ? EyeOff : Eye" size="18"></lucide-icon>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Connexion en cours...
        } @else {
          Se connecter
        }
      </button>
    </form>

    <div class="divider">
      <span>ou continuer avec</span>
    </div>

    <button type="button" class="btn btn-outline btn-block google-btn" (click)="signInWithGoogle()" [disabled]="loading()">
      <svg class="google-logo" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Connexion Google
    </button>

    <div class="auth-footer">
      <span>Pas encore de compte ?</span>
      <a (click)="navigateToSignup()">S'inscrire</a>
    </div>
  </div>
</div>
