<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand">
        <span class="brand-logo">📅</span>
        <h1>CrewDayz</h1>
      </div>
      <p class="subtitle">Créer un compte de gestionnaire RH</p>
    </div>

    <!-- Alert for general errors -->
    @if (errorMessage()) {
      <div class="alert alert-danger animate-fade-in">
        <lucide-icon [img]="Lock" size="18"></lucide-icon>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <!-- Alert for success -->
    @if (successMessage()) {
      <div class="alert alert-success animate-fade-in">
        <lucide-icon [img]="User" size="18"></lucide-icon>
        <span>{{ successMessage() }}</span>
      </div>
    }

    <form (ngSubmit)="signUp()" class="auth-form">
      <div class="form-group">
        <label for="name">Nom complet</label>
        <div class="input-icon-wrapper">
          <lucide-icon [img]="User" class="input-icon" size="18"></lucide-icon>
          <input
            id="name"
            type="text"
            [ngModel]="name()"
            (ngModelChange)="name.set($event)"
            name="name"
            placeholder="Jean Dupont"
            required
            autocomplete="name"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Adresse Email</label>
        <div class="input-icon-wrapper">
          <lucide-icon [img]="Mail" class="input-icon" size="18"></lucide-icon>
          <input
            id="email"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            placeholder="jean.dupont@entreprise.com"
            required
            autocomplete="email"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-icon-wrapper">
          <lucide-icon [img]="Lock" class="input-icon" size="18"></lucide-icon>
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            placeholder="•••••••• (6 caractères min.)"
            required
            autocomplete="new-password"
          />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()" tabindex="-1">
            <lucide-icon [img]="showPassword() ? EyeOff : Eye" size="18"></lucide-icon>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <div class="input-icon-wrapper">
          <lucide-icon [img]="Lock" class="input-icon" size="18"></lucide-icon>
          <input
            id="confirmPassword"
            [type]="showConfirmPassword() ? 'text' : 'password'"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            name="confirmPassword"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          />
          <button type="button" class="toggle-password" (click)="toggleConfirmPasswordVisibility()" tabindex="-1">
            <lucide-icon [img]="showConfirmPassword() ? EyeOff : Eye" size="18"></lucide-icon>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading() || successMessage()">
        @if (loading()) {
          <span class="spinner"></span> Création du compte...
        } @else {
          S'inscrire
        }
      </button>
    </form>

    <div class="auth-footer">
      <span>Vous avez déjà un compte ?</span>
      <a (click)="navigateToLogin()">Se connecter</a>
    </div>
  </div>
</div>
