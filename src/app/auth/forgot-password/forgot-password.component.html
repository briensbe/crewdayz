<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand">
        <span class="brand-logo">📅</span>
        <h1>CrewDayz</h1>
      </div>
      <p class="subtitle">Réinitialiser le mot de passe</p>
    </div>

    <!-- Alert for results -->
    @if (message()) {
      <div class="alert animate-fade-in" [class.alert-danger]="isError()" [class.alert-success]="!isError()">
        <span>{{ message() }}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Adresse Email</label>
        <p class="input-description">Saisissez l'adresse email associée à votre compte. Nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
        <div class="input-icon-wrapper">
          <lucide-icon [img]="Mail" class="input-icon" size="18"></lucide-icon>
          <input
            id="email"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            placeholder="nom@entreprise.com"
            required
            autocomplete="email"
          />
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Envoi en cours...
        } @else {
          Envoyer le lien de réinitialisation
        }
      </button>
    </form>

    <div class="auth-footer">
      <a (click)="navigateToLogin()" class="back-to-login">
        <lucide-icon [img]="ChevronLeft" size="16"></lucide-icon>
        Retour à la connexion
      </a>
    </div>
  </div>
</div>
