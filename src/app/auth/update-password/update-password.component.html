<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="brand">
        <span class="brand-logo">📅</span>
        <h1>CrewDayz</h1>
      </div>
      <p class="subtitle">Définir un nouveau mot de passe</p>
    </div>

    <!-- Error Alert -->
    @if (error()) {
      <div class="alert alert-danger animate-fade-in">
        <lucide-icon [img]="Lock" size="18"></lucide-icon>
        <span>{{ error() }}</span>
      </div>
    }

    <!-- Success message -->
    @if (success()) {
      <div class="success-screen animate-fade-in">
        <lucide-icon [img]="CheckCircle" class="success-icon" size="64"></lucide-icon>
        <h2>Mot de passe modifié !</h2>
        <p>Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter.</p>
        <button class="btn btn-primary btn-block" (click)="goToLogin()">Se connecter</button>
      </div>
    } @else {
      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label for="newPassword">Nouveau mot de passe</label>
          <div class="input-icon-wrapper">
            <lucide-icon [img]="Lock" class="input-icon" size="18"></lucide-icon>
            <input
              id="newPassword"
              [type]="showNewPassword() ? 'text' : 'password'"
              [ngModel]="newPassword()"
              (ngModelChange)="newPassword.set($event)"
              name="newPassword"
              placeholder="•••••••• (6 caractères min.)"
              required
              [disabled]="error() !== null"
            />
            <button type="button" class="toggle-password" (click)="toggleNewPasswordVisibility()" tabindex="-1">
              <lucide-icon [img]="showNewPassword() ? EyeOff : Eye" size="18"></lucide-icon>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <div class="input-icon-wrapper">
            <lucide-icon [img]="Lock" class="input-icon" size="18"></lucide-icon>
            <input
              id="confirmPassword"
              [type]="showConfirmPassword() ? 'text' : 'password'"
              [ngModel]="confirmPassword()"
              (ngModelChange)="confirmPassword.set($event)"
              name="confirmPassword"
              placeholder="••••••••"
              required
              [disabled]="error() !== null"
            />
            <button type="button" class="toggle-password" (click)="toggleConfirmPasswordVisibility()" tabindex="-1">
              <lucide-icon [img]="showConfirmPassword() ? EyeOff : Eye" size="18"></lucide-icon>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" [disabled]="loading() || error() !== null">
          @if (loading()) {
            <span class="spinner"></span> Mise à jour...
          } @else {
            Mettre à jour le mot de passe
          }
        </button>
      </form>
    }
  </div>
</div>
